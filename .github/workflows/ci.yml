name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .devcontainer
        tags: ghcr.io/ltowarek/esp-opentelemetry-cpp-devcontainer
        file: ./.devcontainer/Dockerfile
        push: true

  build:
    needs: build-docker
    permissions:
      contents: read
      actions: read

    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - project: batch example
            path: examples/batch
          - project: ostream example
            path: examples/ostream
            qemu: true
          - project: propagation example
            path: examples/propagation

    container:
      image: ghcr.io/ltowarek/esp-opentelemetry-cpp-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ runner.os }}-idf-${{ matrix.path }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-idf-${{ matrix.path }}-
          ccache-${{ runner.os }}-idf-

    - name: Activate esp-idf
      run: |
        source $IDF_PATH/export.sh
        echo "$PATH" >> $GITHUB_PATH

    - name: Build
      env:
        CCACHE_DIR: ${{ github.workspace }}/.ccache
      run: idf.py build
      working-directory: ${{ matrix.path }}

    - name: Run in QEMU
      if: ${{ matrix.qemu }}
      working-directory: ${{ matrix.path }}
      run: bash test_qemu.sh

  ci-status:
    needs: [build-docker, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Fail if any needed job did not succeed
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
      run: exit 1
