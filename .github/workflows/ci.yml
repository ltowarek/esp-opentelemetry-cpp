name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .devcontainer
        tags: ghcr.io/ltowarek/esp-opentelemetry-cpp-devcontainer
        file: ./.devcontainer/Dockerfile
        push: true

  build:
    needs: build-docker
    permissions:
      contents: read

    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - project: simple example
            path: examples/simple
            qemu: true
          - project: batch example
            path: examples/batch

    container:
      image: ghcr.io/ltowarek/esp-opentelemetry-cpp-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Activate esp-idf
      run: |
        source $IDF_PATH/export.sh
        echo "$PATH" >> $GITHUB_PATH

    - name: Build
      run: idf.py build
      working-directory: ${{ matrix.path }}

    - name: Run in QEMU
      if: ${{ matrix.qemu }}
      working-directory: ${{ matrix.path }}
      run: bash test_qemu.sh
