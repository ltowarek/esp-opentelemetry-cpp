name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        tags: ghcr.io/ltowarek/esp-opentelemetry-cpp-devcontainer
        file: ./.devcontainer/Dockerfile
        push: true

  run-checks:
    needs: build-docker
    permissions:
      contents: read

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ltowarek/esp-opentelemetry-cpp-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Activate esp-idf
      run: |
        source $IDF_PATH/export.sh
        echo "$PATH" >> $GITHUB_PATH

    - name: Build basic example
      run: idf.py -C examples/basic build
